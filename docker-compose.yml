services:
  mixer:
    image: ${MIXER_IMAGE:-ghcr.io/silaeder-labs/silaeder-tech-support-frontend/mixer:latest}
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./config/api.env
    environment:
      - PORT=8080
    depends_on:
      - mock-mixer
      - mock-camera
      - mock-recorder
      - presentation-clicker

  mock-mixer:
    image: ${MOCK_MIXER_IMAGE:-ghcr.io/silaeder-labs/silaeder-tech-support-frontend/mock-mixer:latest}
    build:
      context: ./mock-mixer
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    environment:
      - PORT=8090

  mock-camera:
    image: ${MOCK_CAMERA_IMAGE:-ghcr.io/silaeder-labs/silaeder-tech-support-frontend/mock-camera:latest}
    build:
      context: ./mock-camera
      dockerfile: Dockerfile
    ports:
      - "8091:8091"
    environment:
      - PORT=8091

  mock-recorder:
    image: ${MOCK_RECORDER_IMAGE:-ghcr.io/silaeder-labs/silaeder-tech-support-frontend/mock-recorder:latest}
    build:
      context: ./mock-recorder
      dockerfile: Dockerfile
    ports:
      - "8093:8093"
    environment:
      - PORT=8093

  presentation-clicker:
    image: ${PRESENTATION_CLICKER_IMAGE:-ghcr.io/silaeder-labs/obs-slides-site/presentation-clicker:latest}
    build:
      context: ../obs-slides-site
    ports:
      - "5056:5000"
    environment:
      - PORT=5000
      - SLIDE_HEIGHT=2160
    volumes:
      - ../obs-slides-site/data:/app/data
      - ../obs-slides-site/presentations:/presentations:ro
      - ${HOME}/Downloads:${HOME}/Downloads:ro
    restart: unless-stopped
