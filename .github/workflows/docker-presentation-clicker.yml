name: Docker Presentation Clicker

on:
  push:
    branches:
      - main
      - master
    paths:
      - .github/workflows/docker-presentation-clicker.yml
  pull_request:
    paths:
      - .github/workflows/docker-presentation-clicker.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/silaeder-labs/obs-slides-site/presentation-clicker

jobs:
  docker-image:
    name: Build and push presentation clicker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout obs-slides-site
        uses: actions/checkout@v4
        with:
          repository: silaeder-labs/obs-slides-site
          path: obs-slides-site
          token: ${{ secrets.OBS_SLIDES_SITE_TOKEN || github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.OBS_SLIDES_SITE_TOKEN || github.token }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./obs-slides-site
          file: ./obs-slides-site/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=presentation-clicker
          cache-to: type=gha,mode=max,scope=presentation-clicker
